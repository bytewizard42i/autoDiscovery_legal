name: Test Compile

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Compact compiler
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.compact/bin" >> $GITHUB_PATH

      - name: List contents of Compact bin
        run: ls -l "$HOME/.compact/bin"

      - name: Verify Compact compiler
        run: compactc --version

      - name: Install dependencies
        run: npm install

      - name: Install Compact compiler
        run: npm install -g @midnight-ntwrk/compact@1

      - name: Run test:compile
        working-directory: autodiscovery-contract
        run: npm run test:compile

      - name: Upload compiled contracts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-contracts
          path: autodiscovery-contract/src/managed/
          retention-days: 30
          if-no-files-found: error

      - name: Build contract package
        working-directory: autodiscovery-contract
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: contract-dist
          path: autodiscovery-contract/dist/
          retention-days: 30
          if-no-files-found: error

  verify-artifacts:
    runs-on: ubuntu-latest
    needs: test-compile
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download compiled contracts
        uses: actions/download-artifact@v4
        with:
          name: compiled-contracts
          path: autodiscovery-contract/src/managed/

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: contract-dist
          path: autodiscovery-contract/dist/

      - name: Verify artifacts
        run: |
          ls -la autodiscovery-contract/src/managed/
          test -n "$(ls -A autodiscovery-contract/src/managed/)" || exit 1
          ls -la autodiscovery-contract/dist/
          test -n "$(ls -A autodiscovery-contract/dist/)" || exit 1
